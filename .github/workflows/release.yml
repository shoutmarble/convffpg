name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flatpak-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder appstream desktop-file-utils

      - name: Configure Flatpak runtimes
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install --system -y flathub \
            org.gnome.Platform//48 \
            org.gnome.Sdk//48 \
            org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Validate packaging metadata
        run: ./flatpak/validate-packaging.sh

      - name: Build Flatpak release bundle
        id: bundle
        run: |
          npm run build
          flatpak-builder --force-clean --repo=flatpak-repo build-flatpak flatpak/io.github.terry.convffpg.yml
          bundle_name="convffpg_${GITHUB_REF_NAME:-manual}_linux_x86_64.flatpak"
          flatpak build-bundle flatpak-repo "$bundle_name" io.github.terry.convffpg master
          echo "bundle_name=$bundle_name" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: convffpg-release-flatpak
          path: ${{ steps.bundle.outputs.bundle_name }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.bundle.outputs.bundle_name }}
          generate_release_notes: true