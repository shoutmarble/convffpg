name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install native build and packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flatpak \
            flatpak-builder \
            appstream \
            desktop-file-utils \
            libgtk-3-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Configure Flatpak runtimes
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install --system -y flathub \
            org.gnome.Platform//48 \
            org.gnome.Sdk//48 \
            org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build Linux binary release asset
        id: binary
        run: |
          npm run build
          cargo build --release --manifest-path src-tauri/Cargo.toml
          binary_name="convffpg_${GITHUB_REF_NAME:-manual}_linux_x86_64"
          install -Dm755 src-tauri/target/release/convffpg-tauri "$binary_name"
          echo "binary_name=$binary_name" >> "$GITHUB_OUTPUT"

      - name: Validate packaging metadata
        run: ./flatpak/validate-packaging.sh

      - name: Build Flatpak release bundle
        id: bundle
        run: |
          flatpak-builder --force-clean --repo=flatpak-repo build-flatpak flatpak/io.github.terry.convffpg.yml
          bundle_name="convffpg_${GITHUB_REF_NAME:-manual}_linux_x86_64.flatpak"
          flatpak build-bundle flatpak-repo "$bundle_name" io.github.terry.convffpg master
          echo "bundle_name=$bundle_name" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: convffpg-release-assets
          path: |
            ${{ steps.binary.outputs.binary_name }}
            ${{ steps.bundle.outputs.bundle_name }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.binary.outputs.binary_name }}
            ${{ steps.bundle.outputs.bundle_name }}
          generate_release_notes: true